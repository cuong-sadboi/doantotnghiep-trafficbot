services:
  mysql:
    image: mysql:8.0
    container_name: traffic-bot-db-local
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: doantotnghiep
    volumes:
      - mysql_local_data:/var/lib/mysql

volumes:
  mysql_local_data:
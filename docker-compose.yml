services:
  # 1. Cơ sở dữ liệu MySQL
  db:
    image: mysql:8.0
    container_name: traffic-bot-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: doantotnghiep
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Dịch vụ AI (Python Flask API)
  ai-service:
    build:
      context: ./AI-service
      dockerfile: Dockerfile
    container_name: traffic-bot-ai
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DEBUG=false

  # 3. Backend (NestJS)
  backend:
    build:
      context: ./system-management
      dockerfile: Dockerfile
    container_name: traffic-bot-backend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      - PORT=3001
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=doantotnghiep
      - MYSQL_SYNCHRONIZE=true
      - MYSQL_LOGGING=false
      - AI_SERVICE_URL=http://ai-service:5000
      - JWT_SECRET=replace_with_a_long_random_secret
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:3000
      - STREAM_SOURCE_URL=https://www.pythonanywhere.com/user/cuong1512/files/var/log/cuong1512.pythonanywhere.com.access.log
      - STREAM_API_TOKEN=24247a90fa06e45e19ea19979553baee5f86724d
      - STREAM_SOURCE_KEY=pythonanywhere
      - STREAM_POLL_INTERVAL_MS=10000

  # 4. Frontend (Next.js)
  frontend:
    build:
      context: ./admin-web/traffic-bot-system
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:3001

    container_name: traffic-bot-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # 5. Go API (REST API nhỏ chạy độc lập)
  go-api:
    build:
      context: ./system-management/go-api
      dockerfile: Dockerfile
    container_name: traffic-bot-go-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - API_ADDR=:8080

volumes:
  db_data:
